# Mobile Tavern 云端后端本地开发编排
#
# 用途：
#   - 本地开发：`docker compose up -d postgres redis` 仅启动依赖
#   - 全栈联调：`docker compose --profile full up -d` 同时构建并启动 cloud 服务
#   - 数据重置：`docker compose down -v` 删除卷
#
# 生产部署：此文件不用于生产，生产用海外 VPS 上的 docker compose / k8s。
# 详见 docs/agents/cloud_strategy.md

services:
  postgres:
    image: postgres:16-alpine
    container_name: tavern-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tavern}
      POSTGRES_USER: ${POSTGRES_USER:-tavern}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tavern_dev}
    ports:
      - "5432:5432"
    volumes:
      - tavern-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tavern} -d ${POSTGRES_DB:-tavern}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: tavern-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - tavern-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s

  cloud:
    # 全栈联调时启用：--profile full
    # 本地开发期一般用 cargo run 直接跑 cloud 服务（更快迭代）
    profiles: ["full"]
    build:
      context: .
      dockerfile: cloud/Dockerfile
    container_name: tavern-cloud
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-tavern}:${POSTGRES_PASSWORD:-tavern_dev}@postgres:5432/${POSTGRES_DB:-tavern}
      REDIS_URL: redis://redis:6379
      PORT: 8080
      RUST_LOG: ${RUST_LOG:-info,mobile_tavern_cloud=debug}
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_me_in_production_to_at_least_32_bytes}
      JWT_EXPIRES_HOURS: ${JWT_EXPIRES_HOURS:-24}
      JWT_REFRESH_EXPIRES_DAYS: ${JWT_REFRESH_EXPIRES_DAYS:-30}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-tauri://localhost,capacitor://localhost,http://localhost:3000}
    ports:
      - "8080:8080"

volumes:
  tavern-pg-data:
    driver: local
  tavern-redis-data:
    driver: local