<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" />
  <title>Mobile-Tavern</title>
  <style>
    /* 默认设为“荧光深海”主题的深蓝底色，防止任何初始化白屏 */
    html, body {
      background-color: #0d1726 !important;
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }
  </style>
  <script>
    (function() {
      var theme = localStorage.getItem("mobile_tavern_theme") || localStorage.getItem("siuser-theme") || "ocean";
      document.documentElement.setAttribute("data-theme", theme);
      
      var bg = "#0d1726"; // 默认 ocean (荧光深海)
      if (theme === "ocean") {
        bg = "#0d1726";
      } else if (theme === "obsidian") {
        bg = "#0f0f12";
      } else if (theme === "snow") {
        bg = "#f8fafc";
      } else if (theme === "sand") {
        bg = "#f5f5f4";
      }
      
      // 若非默认的 ocean 主题，则动态覆盖背景色
      if (theme !== "ocean") {
        document.documentElement.style.backgroundColor = bg;
        var style = document.createElement('style');
        style.innerHTML = 'html, body { background-color: ' + bg + ' !important; }';
        document.documentElement.appendChild(style);
      }
      
      if (theme === "ocean" || theme === "obsidian") {
        document.documentElement.classList.add("dark");
        document.documentElement.style.colorScheme = "dark";
      } else {
        document.documentElement.classList.remove("dark");
        document.documentElement.style.colorScheme = "light";
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
