name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install dependencies
        run: npm ci

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager "ndk;27.0.12077973"

      - name: Set NDK Home
        run: |
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Initialize Android Project
        run: npx tauri android init
        continue-on-error: true

      - name: Fix gradlew permissions
        run: chmod +x src-tauri/gen/android/gradlew
        continue-on-error: true

      - name: Build Android APK
        run: npx tauri android build --apk --target aarch64
        env:
          NDK_HOME: /usr/local/lib/android/sdk/ndk/27.0.12077973
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/27.0.12077973

      - name: Sign and Prepare APK
        env:
          KEYSTORE_B64: ${{ secrets.SIGNING_KEY }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ALIAS }}
        run: |
          apk_path=$(find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" | grep release | head -n 1)
          if [ -z "$apk_path" ]; then
            apk_path=$(find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" | head -n 1)
          fi
          if [ -n "$apk_path" ]; then
            echo "Using APK at: $apk_path"
            # Decode Keystore
            echo "$KEYSTORE_B64" | base64 -d > release.keystore

            # Find Build Tools
            BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -1)

            # Zipalign
            $BUILD_TOOLS_DIR/zipalign -v -f 4 "$apk_path" MobileTavern-aligned.apk

            # Sign
            $BUILD_TOOLS_DIR/apksigner sign --ks release.keystore --ks-key-alias "$KEY_ALIAS" --ks-pass "pass:$KEYSTORE_PASSWORD" MobileTavern-aligned.apk

            mv MobileTavern-aligned.apk MobileTavern.apk
          else
            echo "::error::APK not found"
            exit 1
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-tavern-release.apk
          path: MobileTavern.apk

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: MobileTavern.apk
          draft: true
