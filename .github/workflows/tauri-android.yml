name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  NO_PROXY: localhost,127.0.0.1,::1
  _JAVA_OPTIONS: -Djava.net.preferIPv4Stack=true
  GRADLE_OPTS: -Djava.net.preferIPv4Stack=true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install npm dependencies
        run: npm install

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'tools platform-tools ndk;29.0.14206865'

      - name: Set NDK environment
        run: |
          echo "NDK_HOME=$ANDROID_HOME/ndk/29.0.14206865" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/29.0.14206865" >> $GITHUB_ENV

      - name: Generate and Sync Tauri Icons
        run: |
          node scripts/decode_icon.cjs

      - name: Fix gradlew permissions
        run: chmod +x src-tauri/gen/android/gradlew

      - name: Cache Gradle distribution
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper/dists
          key: gradle-wrapper-${{ runner.os }}-${{ hashFiles('src-tauri/gen/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-wrapper-${{ runner.os }}-

      - name: Cache Gradle caches
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-caches-${{ runner.os }}-${{ hashFiles('src-tauri/gen/android/**/*.gradle*', 'src-tauri/gen/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-caches-${{ runner.os }}-

      - name: Pre-warm Gradle distribution
        run: cd src-tauri/gen/android && ./gradlew --version

      - name: Build Android APK
        run: npm run build:android

      - name: Sign and Prepare APK
        env:
          KEYSTORE_B64: ${{ secrets.SIGNING_KEY }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ALIAS }}
        run: |
          apk_path=$(find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" | grep release | head -n 1)
          if [ -z "$apk_path" ]; then
            apk_path=$(find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" | head -n 1)
          fi
          if [ -n "$apk_path" ]; then
            echo "Using APK at: $apk_path"
            BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -1)
            if [ -n "$KEYSTORE_B64" ]; then
              echo "Keystore secret detected. Proceeding with signing."
              echo "$KEYSTORE_B64" | base64 -d > release.keystore
              $BUILD_TOOLS_DIR/zipalign -v -f 4 "$apk_path" MobileTavern-aligned.apk
              $BUILD_TOOLS_DIR/apksigner sign --ks release.keystore --ks-key-alias "$KEY_ALIAS" --ks-pass "pass:$KEYSTORE_PASSWORD" MobileTavern-aligned.apk
              mv MobileTavern-aligned.apk MobileTavern.apk
            else
              echo "WARNING: SIGNING_KEY secret not found. Skipping signing. Copying raw APK."
              cp "$apk_path" MobileTavern.apk
            fi
          else
            echo "::error::APK not found"
            exit 1
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-tavern-release.apk
          path: MobileTavern.apk

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: MobileTavern.apk
          draft: true
