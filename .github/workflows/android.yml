name: Tauri v2 Android Manual Build

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. 前端 Node 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Web Dependencies
        run: npm install

      - name: Build Web Frontend
        run: npm run build

      # 2. Java 环境
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. 安卓 SDK & NDK
      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager --install "ndk;26.1.10909125"

      # 4. 设置环境变量
      - name: Set Android Environment Variables
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      # 5. Rust 核心工具链 (更换为最基础版本，防止自动扫描根目录报错)
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      # 6. Rust 独立缓存 (💡核心修复点：明确指路 src-tauri)
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workdir: './src-tauri'

      # 7. 打包 APK
      - name: Build Android APK
        run: |
          npx tauri android build --apk

      # 8. 上传产物
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-Tavern-Lite-APK
          path: src-tauri/gen/android/app/build/outputs/apk/debug/app-debug.apk