<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>霓虹围城</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="game" aria-label="霓虹围城实时战场">
      <img class="backdrop" src="assets/sky-arena.png" alt="" />
      <div id="pixi-stage"></div>
      <header class="hud">
        <button id="leave" class="glass-button" aria-label="退出游戏">‹</button>
        <div class="identity"><span>PIXI PROTOCOL // WEBGL</span><strong>霓虹围城</strong></div>
        <div class="meters">
          <label>机体 <i><b id="player-hp"></b></i></label>
          <label class="boss">裂隙核心 <i><b id="boss-hp"></b></i></label>
        </div>
        <div class="score"><span>战果</span><strong id="score">000000</strong></div>
        <button id="pause" class="glass-button" aria-label="暂停游戏">Ⅱ</button>
      </header>
      <footer class="controls">
        <div><strong>拖动光标移动</strong><span>武器自动锁定 · 闪避弹幕积累能量</span></div>
        <button id="burst" disabled><span>✦</span><strong>星爆</strong><small id="energy">0%</small></button>
      </footer>
      <section id="start-screen" class="overlay visible">
        <div class="panel">
          <span class="eyebrow">A REAL-TIME PIXIJS BATTLE</span>
          <h1>霓虹<br /><em>围城</em></h1>
          <p>指尖拖动星舰穿越弹幕。武器会自动开火，能量充满后释放星爆清场。</p>
          <button id="start">启动连接 <b>→</b></button>
          <small id="record">尚无作战记录</small>
        </div>
      </section>
      <section id="result-screen" class="overlay">
        <div class="panel compact">
          <span class="eyebrow">CONNECTION CLOSED</span>
          <h2 id="result-title">核心击破</h2>
          <p id="result-copy"></p>
          <button id="restart">再次出击 <b>↻</b></button>
        </div>
      </section>
      <div class="rotate"><b>↻</b><strong>请横屏游玩</strong><span>旋转设备以展开战场</span></div>
    </main>
    <script src="game.js"></script>
  </body>
</html>
